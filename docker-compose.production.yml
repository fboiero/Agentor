# Production Docker Compose for Argentor
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  argentor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ARGENTOR_PORT:-8080}:8080"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - ARGENTOR_HOST=0.0.0.0
      - ARGENTOR_PORT=8080
      # LLM Provider Keys (configure as needed)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - argentor-data:/data
      - argentor-audit:/audit
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '2'
        reservations:
          memory: 128M
          cpus: '0.5'
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=100M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    profiles:
      - monitoring
    restart: unless-stopped

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-argentor}
    volumes:
      - grafana-data:/var/lib/grafana
    profiles:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  argentor-data:
  argentor-audit:
  prometheus-data:
  grafana-data:
