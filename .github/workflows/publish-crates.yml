name: Publish Crates (Manual)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2

      - name: Build echo-skill WASM (needed for tests)
        run: cargo build --target wasm32-wasip1 --release --manifest-path skills/echo-skill/Cargo.toml

      - name: Publish crates in dependency order
        run: |
          CRATES=(
            argentor-core
            argentor-security
            argentor-session
            argentor-memory
            argentor-skills
            argentor-channels
            argentor-compliance
            argentor-mcp
            argentor-builtins
            argentor-agent
            argentor-a2a
            argentor-orchestrator
            argentor-gateway
          )

          DRY_RUN="${{ inputs.dry_run }}"
          PUBLISHED=0
          SKIPPED=0
          FAILED=0
          MAX_RETRIES=3

          for crate in "${CRATES[@]}"; do
            echo "========================================="
            echo "Publishing $crate..."
            echo "========================================="

            PUBLISH_CMD="cargo publish -p $crate --no-verify"
            if [ "$DRY_RUN" = "true" ]; then
              PUBLISH_CMD="cargo publish -p $crate --dry-run"
            fi

            RETRY=0
            SUCCESS=false
            while [ $RETRY -lt $MAX_RETRIES ]; do
              if $PUBLISH_CMD 2>&1 | tee /tmp/publish_output.txt; then
                echo "SUCCESS: $crate published!"
                PUBLISHED=$((PUBLISHED + 1))
                SUCCESS=true
                break
              else
                if grep -q "already uploaded\|already exists" /tmp/publish_output.txt; then
                  echo "INFO: $crate already published, skipping."
                  SKIPPED=$((SKIPPED + 1))
                  SUCCESS=true
                  break
                elif grep -q "429\|Too Many Requests\|rate.limit" /tmp/publish_output.txt; then
                  RETRY=$((RETRY + 1))
                  # Extract wait time from error message, default to 120s
                  WAIT_UNTIL=$(grep -oP 'try again after \K[^"]+' /tmp/publish_output.txt || echo "")
                  if [ -n "$WAIT_UNTIL" ]; then
                    echo "RATE LIMITED: Waiting until $WAIT_UNTIL (retry $RETRY/$MAX_RETRIES)"
                    # Calculate seconds to wait
                    TARGET_EPOCH=$(date -d "$WAIT_UNTIL" +%s 2>/dev/null || echo "0")
                    NOW_EPOCH=$(date +%s)
                    if [ "$TARGET_EPOCH" -gt "$NOW_EPOCH" ]; then
                      WAIT_SECS=$(( TARGET_EPOCH - NOW_EPOCH + 10 ))
                      echo "Sleeping ${WAIT_SECS}s until rate limit resets..."
                      sleep "$WAIT_SECS"
                    else
                      echo "Rate limit reset time already passed, waiting 120s as fallback..."
                      sleep 120
                    fi
                  else
                    echo "RATE LIMITED: Waiting 120s before retry $RETRY/$MAX_RETRIES..."
                    sleep 120
                  fi
                else
                  echo "ERROR: $crate publish failed with unexpected error!"
                  echo "--- Error output ---"
                  cat /tmp/publish_output.txt
                  echo "--- End error output ---"
                  FAILED=$((FAILED + 1))
                  exit 1
                fi
              fi
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "ERROR: $crate failed after $MAX_RETRIES retries!"
              FAILED=$((FAILED + 1))
              exit 1
            fi

            echo ""
            sleep 30  # Wait for crates.io index update
          done

          echo "========================================="
          echo "SUMMARY"
          echo "========================================="
          echo "Published: $PUBLISHED"
          echo "Skipped (already uploaded): $SKIPPED"
          echo "Failed: $FAILED"
          echo "Total: $((PUBLISHED + SKIPPED + FAILED)) / ${#CRATES[@]}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
