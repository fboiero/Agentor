name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: Run full test suite
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - name: Build echo-skill WASM
        run: cargo build --target wasm32-wasip1 --release --manifest-path skills/echo-skill/Cargo.toml
      - name: Run tests
        run: cargo test --workspace

  # Job 2: Create GitHub Release with auto-generated notes
  create-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Build and upload platform binaries
  upload-binaries:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p argentor-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package
        shell: bash
        run: |
          BINARY_NAME=argentor
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="argentor-${TAG}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE"
          cp "target/${{ matrix.target }}/release/$BINARY_NAME" "$ARCHIVE/" || true
          cp README.md LICENSE "$ARCHIVE/"
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            argentor-*.tar.gz
            argentor-*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 4: Publish to crates.io
  publish-crates:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates in dependency order
        run: |
          CRATES=(
            argentor-core
            argentor-security
            argentor-session
            argentor-memory
            argentor-skills
            argentor-channels
            argentor-compliance
            argentor-mcp
            argentor-builtins
            argentor-agent
            argentor-a2a
            argentor-orchestrator
            argentor-gateway
          )
          MAX_RETRIES=3
          for crate in "${CRATES[@]}"; do
            echo "========================================="
            echo "Publishing $crate..."
            echo "========================================="
            RETRY=0
            SUCCESS=false
            while [ $RETRY -lt $MAX_RETRIES ]; do
              if cargo publish -p "$crate" --no-verify 2>&1 | tee /tmp/publish_output.txt; then
                echo "SUCCESS: $crate published!"
                SUCCESS=true
                break
              else
                if grep -q "already uploaded\|already exists" /tmp/publish_output.txt; then
                  echo "INFO: $crate already published, skipping."
                  SUCCESS=true
                  break
                elif grep -q "429\|Too Many Requests\|rate.limit" /tmp/publish_output.txt; then
                  RETRY=$((RETRY + 1))
                  WAIT_UNTIL=$(grep -oP 'try again after \K[^"]+' /tmp/publish_output.txt || echo "")
                  if [ -n "$WAIT_UNTIL" ]; then
                    echo "RATE LIMITED: Waiting until $WAIT_UNTIL (retry $RETRY/$MAX_RETRIES)"
                    TARGET_EPOCH=$(date -d "$WAIT_UNTIL" +%s 2>/dev/null || echo "0")
                    NOW_EPOCH=$(date +%s)
                    if [ "$TARGET_EPOCH" -gt "$NOW_EPOCH" ]; then
                      WAIT_SECS=$(( TARGET_EPOCH - NOW_EPOCH + 10 ))
                      echo "Sleeping ${WAIT_SECS}s..."
                      sleep "$WAIT_SECS"
                    else
                      sleep 120
                    fi
                  else
                    echo "RATE LIMITED: Waiting 120s (retry $RETRY/$MAX_RETRIES)..."
                    sleep 120
                  fi
                else
                  echo "ERROR: $crate publish failed!"
                  cat /tmp/publish_output.txt
                  exit 1
                fi
              fi
            done
            if [ "$SUCCESS" = "false" ]; then
              echo "ERROR: $crate failed after $MAX_RETRIES retries!"
              exit 1
            fi
            sleep 30  # Wait for crates.io index update
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Job 5: Publish Python SDK to PyPI
  publish-python:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build and publish
        working-directory: sdks/python
        run: |
          python -m build
          twine upload dist/* --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # Job 6: Publish TypeScript SDK to npm
  publish-typescript:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build and publish
        working-directory: sdks/typescript
        run: |
          npm install
          npx tsc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Job 7: Build and publish Docker image
  publish-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/argentor:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/argentor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
