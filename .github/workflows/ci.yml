name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-
      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fmt, check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            skills/echo-skill/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: Build echo-skill WASM example
        run: cargo build --target wasm32-wasip1 --release --manifest-path skills/echo-skill/Cargo.toml
      - name: Run workspace tests
        run: cargo test --workspace
      - name: Print test summary
        if: always()
        run: cargo test --workspace 2>&1 | grep "test result:" | awk '{sum += $4; fail += $6} END {print "Total:", sum, "passed,", fail, "failed"}'

  test-count-regression:
    name: Test count regression gate
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            skills/echo-skill/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: Build echo-skill WASM
        run: cargo build --target wasm32-wasip1 --release --manifest-path skills/echo-skill/Cargo.toml
      - name: Count tests (current branch)
        id: count
        run: |
          set +e
          COUNT=$(cargo test --workspace --no-fail-fast 2>&1 | grep "test result:" | awk '{sum += $4} END {print sum}')
          set -e
          echo "count=${COUNT:-0}" >> "$GITHUB_OUTPUT"
          echo "Current test count: ${COUNT:-0}"
      - name: Load baseline
        id: baseline
        run: |
          # Baseline lives in .github/test-count.baseline (plain integer)
          # Tolerance: allow -0.5% regression (accounts for genuinely removed tests)
          BASELINE=$(cat .github/test-count.baseline 2>/dev/null || echo "0")
          TOLERANCE_PCT=5  # 0.5% expressed in tenths-of-percent for integer math
          MIN_ALLOWED=$(( BASELINE - BASELINE * TOLERANCE_PCT / 1000 ))
          echo "baseline=${BASELINE}" >> "$GITHUB_OUTPUT"
          echo "min_allowed=${MIN_ALLOWED}" >> "$GITHUB_OUTPUT"
          echo "Baseline: ${BASELINE}, min allowed (-0.5%): ${MIN_ALLOWED}"
      - name: Enforce regression gate
        run: |
          CURRENT="${{ steps.count.outputs.count }}"
          BASELINE="${{ steps.baseline.outputs.baseline }}"
          MIN="${{ steps.baseline.outputs.min_allowed }}"
          if [ "$BASELINE" -eq 0 ]; then
            echo "::warning::No baseline found at .github/test-count.baseline — skipping gate"
            echo "Creating suggested baseline: echo $CURRENT > .github/test-count.baseline"
            exit 0
          fi
          if [ "$CURRENT" -lt "$MIN" ]; then
            echo "::error::Test count regression detected!"
            echo "  Baseline: $BASELINE"
            echo "  Current:  $CURRENT"
            echo "  Min allowed (-0.5% tolerance): $MIN"
            echo ""
            echo "If tests were intentionally removed, update .github/test-count.baseline"
            echo "Otherwise, restore missing tests before merging."
            exit 1
          fi
          if [ "$CURRENT" -gt "$BASELINE" ]; then
            DELTA=$((CURRENT - BASELINE))
            echo "::notice::Test count increased by $DELTA (${BASELINE} → ${CURRENT}). Consider updating baseline."
          else
            echo "Test count within tolerance: ${CURRENT} vs baseline ${BASELINE}"
          fi

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - run: cargo clippy --workspace --all-targets -- -D warnings -A missing-docs

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit || true  # warn but don't fail (advisory-only for now)

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-
      - name: Run benchmarks
        run: |
          cargo bench -p argentor-core --bench core_benchmarks -- --warm-up-time 1 --measurement-time 2
          cargo bench -p argentor-security --bench security_benchmarks -- --warm-up-time 1 --measurement-time 2
          cargo bench -p argentor-skills --bench skills_benchmarks -- --warm-up-time 1 --measurement-time 2
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: target/criterion/
          retention-days: 30

  comparison-experiment:
    name: Comparison Experiment
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-comparison-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-comparison-
      - name: Run comparison experiment
        run: |
          cargo run -p argentor-comparison --release --quiet 2>/dev/null | \
            awk '/^\[/{flag=1} flag{print}' > experiment_results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: comparison-experiment-results
          path: experiment_results.json
          retention-days: 90

  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        working-directory: sdks/python
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          python -c "from argentor import ArgentorClient; print('Python SDK imports OK')"
          python -m pytest tests/ -v 2>/dev/null || echo "Tests not yet configured"

  sdk-typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install, build, typecheck
        working-directory: sdks/typescript
        run: |
          npm install
          npx tsc --noEmit
          npm run build
