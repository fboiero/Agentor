name: Publish SDKs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't actually publish)"
        required: false
        default: "true"

jobs:
  generate:
    name: Generate SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sdk-${{ hashFiles('**/Cargo.lock') }}
      - name: Generate SDKs
        run: cargo run -p argentor-cli --example generate_sdks
      - uses: actions/upload-artifact@v4
        with:
          name: sdks
          path: generated-sdks/

  publish-pypi:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [generate]
    if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
    permissions:
      id-token: write  # for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdks
          path: generated-sdks/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build package
        working-directory: generated-sdks/python
        run: python -m build
      - name: Publish to PyPI
        working-directory: generated-sdks/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/* --skip-existing

  publish-npm:
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    needs: [generate]
    if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdks
          path: generated-sdks/
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install and build
        working-directory: generated-sdks/typescript
        run: |
          npm install
          npm run build
      - name: Publish to npm
        working-directory: generated-sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
