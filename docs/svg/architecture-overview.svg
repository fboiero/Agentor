<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'SF Mono','Fira Code',monospace" font-size="11">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d23"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#21262d"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="900" height="700" fill="url(#bg)" rx="12"/>
  <text x="450" y="35" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">ARGENTOR — Architecture Overview</text>
  <!-- CLI + Gateway + Dashboard -->
  <rect x="30" y="55" width="140" height="40" fill="url(#card)" stroke="#30363d" rx="6"/>
  <text x="100" y="80" text-anchor="middle" fill="#e6edf3">CLI / REPL</text>
  <rect x="190" y="55" width="200" height="40" fill="url(#card)" stroke="#30363d" rx="6"/>
  <text x="290" y="80" text-anchor="middle" fill="#e6edf3">Gateway (REST/WS)</text>
  <rect x="410" y="55" width="140" height="40" fill="url(#card)" stroke="#30363d" rx="6"/>
  <text x="480" y="80" text-anchor="middle" fill="#e6edf3">Dashboard</text>
  <rect x="570" y="55" width="160" height="40" fill="url(#card)" stroke="#30363d" rx="6"/>
  <text x="650" y="80" text-anchor="middle" fill="#e6edf3">SSO (OIDC/SAML)</text>
  <rect x="750" y="55" width="120" height="40" fill="url(#card)" stroke="#30363d" rx="6"/>
  <text x="810" y="80" text-anchor="middle" fill="#e6edf3">SDKs (Py/TS)</text>
  <!-- Arrow down -->
  <line x1="450" y1="95" x2="450" y2="115" stroke="#484f58" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Agent Runner -->
  <rect x="60" y="115" width="780" height="95" fill="url(#card)" stroke="#58a6ff" stroke-width="2" rx="8"/>
  <text x="450" y="135" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">AGENT RUNNER</text>
  <rect x="80" y="145" width="120" height="30" fill="#1c2128" stroke="#3fb950" rx="4"/>
  <text x="140" y="165" text-anchor="middle" fill="#3fb950" font-size="10">Guardrails</text>
  <rect x="215" y="145" width="120" height="30" fill="#1c2128" stroke="#d29922" rx="4"/>
  <text x="275" y="165" text-anchor="middle" fill="#d29922" font-size="10">Cache (LRU)</text>
  <rect x="350" y="145" width="130" height="30" fill="#1c2128" stroke="#f85149" rx="4"/>
  <text x="415" y="165" text-anchor="middle" fill="#f85149" font-size="10">Circuit Breaker</text>
  <rect x="495" y="145" width="130" height="30" fill="#1c2128" stroke="#bc8cff" rx="4"/>
  <text x="560" y="165" text-anchor="middle" fill="#bc8cff" font-size="10">Debug Recorder</text>
  <rect x="640" y="145" width="180" height="30" fill="#1c2128" stroke="#58a6ff" rx="4"/>
  <text x="730" y="165" text-anchor="middle" fill="#58a6ff" font-size="10">14 LLM Providers</text>
  <text x="450" y="200" text-anchor="middle" fill="#8b949e" font-size="10">Claude | OpenAI | Gemini | Ollama | Mistral | xAI | Azure | Cerebras | Together | DeepSeek | vLLM | OpenRouter | Failover</text>
  <!-- Arrow down -->
  <line x1="450" y1="210" x2="450" y2="230" stroke="#484f58" stroke-width="2"/>
  <!-- Skill Registry -->
  <rect x="60" y="230" width="780" height="70" fill="url(#card)" stroke="#3fb950" stroke-width="2" rx="8"/>
  <text x="450" y="252" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="bold">SKILL REGISTRY (40+ Skills)</text>
  <rect x="80" y="262" width="150" height="28" fill="#1c2128" stroke="#30363d" rx="4"/>
  <text x="155" y="280" text-anchor="middle" fill="#e6edf3" font-size="10">Built-in (40+)</text>
  <rect x="245" y="262" width="150" height="28" fill="#1c2128" stroke="#30363d" rx="4"/>
  <text x="320" y="280" text-anchor="middle" fill="#e6edf3" font-size="10">WASM Plugins</text>
  <rect x="410" y="262" width="150" height="28" fill="#1c2128" stroke="#30363d" rx="4"/>
  <text x="485" y="280" text-anchor="middle" fill="#e6edf3" font-size="10">Markdown Skills</text>
  <rect x="575" y="262" width="150" height="28" fill="#1c2128" stroke="#30363d" rx="4"/>
  <text x="650" y="280" text-anchor="middle" fill="#e6edf3" font-size="10">MCP Skills (Remote)</text>
  <rect x="740" y="262" width="85" height="28" fill="#1c2128" stroke="#30363d" rx="4"/>
  <text x="782" y="280" text-anchor="middle" fill="#e6edf3" font-size="9">Marketplace</text>
  <!-- Middle row -->
  <rect x="30" y="320" width="260" height="100" fill="url(#card)" stroke="#bc8cff" stroke-width="1.5" rx="8"/>
  <text x="160" y="342" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="bold">ORCHESTRATOR</text>
  <text x="160" y="360" text-anchor="middle" fill="#8b949e" font-size="9">6 Collaboration Patterns</text>
  <text x="160" y="375" text-anchor="middle" fill="#e6edf3" font-size="9">Pipeline | MapReduce | Debate</text>
  <text x="160" y="390" text-anchor="middle" fill="#e6edf3" font-size="9">Ensemble | Supervisor | Swarm</text>
  <text x="160" y="408" text-anchor="middle" fill="#8b949e" font-size="9">TaskQueue, Workflows, DevTeam</text>
  <rect x="310" y="320" width="270" height="100" fill="url(#card)" stroke="#d29922" stroke-width="1.5" rx="8"/>
  <text x="445" y="342" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">MEMORY &amp; RAG</text>
  <text x="445" y="360" text-anchor="middle" fill="#e6edf3" font-size="9">Vector Store (File/InMemory)</text>
  <text x="445" y="375" text-anchor="middle" fill="#e6edf3" font-size="9">RAG Pipeline (4 chunking strategies)</text>
  <text x="445" y="390" text-anchor="middle" fill="#e6edf3" font-size="9">Hybrid Search (BM25 + Embeddings)</text>
  <text x="445" y="408" text-anchor="middle" fill="#8b949e" font-size="9">OpenAI | Cohere | Voyage | Local</text>
  <rect x="600" y="320" width="270" height="100" fill="url(#card)" stroke="#f85149" stroke-width="1.5" rx="8"/>
  <text x="735" y="342" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">COMPLIANCE</text>
  <text x="735" y="362" text-anchor="middle" fill="#e6edf3" font-size="9">GDPR (consent, DSR, DPIA)</text>
  <text x="735" y="377" text-anchor="middle" fill="#e6edf3" font-size="9">ISO 27001 (access, incidents)</text>
  <text x="735" y="392" text-anchor="middle" fill="#e6edf3" font-size="9">ISO 42001 (AI systems, bias)</text>
  <text x="735" y="407" text-anchor="middle" fill="#8b949e" font-size="9">Report Gen: MD | JSON | HTML</text>
  <!-- Bottom row -->
  <rect x="30" y="440" width="200" height="90" fill="url(#card)" stroke="#f85149" stroke-width="1.5" rx="8"/>
  <text x="130" y="462" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">SECURITY</text>
  <text x="130" y="480" text-anchor="middle" fill="#e6edf3" font-size="9">Capabilities + RBAC</text>
  <text x="130" y="495" text-anchor="middle" fill="#e6edf3" font-size="9">AES-256 Encryption</text>
  <text x="130" y="510" text-anchor="middle" fill="#e6edf3" font-size="9">Audit Log + SIEM Export</text>
  <text x="130" y="525" text-anchor="middle" fill="#8b949e" font-size="9">TLS/mTLS, SLA, Rate Limit</text>
  <rect x="250" y="440" width="200" height="90" fill="url(#card)" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="350" y="462" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">SESSIONS</text>
  <text x="350" y="480" text-anchor="middle" fill="#e6edf3" font-size="9">File / SQLite Backend</text>
  <text x="350" y="495" text-anchor="middle" fill="#e6edf3" font-size="9">Usage + Persona Store</text>
  <text x="350" y="510" text-anchor="middle" fill="#e6edf3" font-size="9">Transcripts</text>
  <text x="350" y="525" text-anchor="middle" fill="#8b949e" font-size="9">Multi-tenant isolation</text>
  <rect x="470" y="440" width="200" height="90" fill="url(#card)" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="570" y="462" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">PROTOCOLS</text>
  <text x="570" y="480" text-anchor="middle" fill="#e6edf3" font-size="9">MCP (JSON-RPC 2.0)</text>
  <text x="570" y="495" text-anchor="middle" fill="#e6edf3" font-size="9">A2A (Agent-to-Agent)</text>
  <text x="570" y="510" text-anchor="middle" fill="#e6edf3" font-size="9">Credential Vault (encrypted)</text>
  <text x="570" y="525" text-anchor="middle" fill="#8b949e" font-size="9">Proxy Orchestrator, Token Pool</text>
  <rect x="690" y="440" width="180" height="90" fill="url(#card)" stroke="#d29922" stroke-width="1.5" rx="8"/>
  <text x="780" y="462" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">OBSERVABILITY</text>
  <text x="780" y="480" text-anchor="middle" fill="#e6edf3" font-size="9">OpenTelemetry (OTLP)</text>
  <text x="780" y="495" text-anchor="middle" fill="#e6edf3" font-size="9">Prometheus Metrics</text>
  <text x="780" y="510" text-anchor="middle" fill="#e6edf3" font-size="9">Request Tracing</text>
  <text x="780" y="525" text-anchor="middle" fill="#8b949e" font-size="9">X-Trace-Id, Debug Recorder</text>
  <!-- Foundation -->
  <rect x="30" y="550" width="840" height="45" fill="url(#card)" stroke="#484f58" stroke-width="1.5" rx="8"/>
  <text x="450" y="577" text-anchor="middle" fill="#8b949e" font-size="12" font-weight="bold">CORE — Message | ToolCall | ToolResult | ArgentorError | EventBus | CorrelationContext | DataResidency</text>
  <!-- Stats bar -->
  <rect x="30" y="610" width="840" height="55" fill="#161b22" stroke="#30363d" rx="8"/>
  <text x="120" y="635" text-anchor="middle" fill="#3fb950" font-size="11">3,400 tests</text>
  <text x="260" y="635" text-anchor="middle" fill="#58a6ff" font-size="11">~130K LOC</text>
  <text x="400" y="635" text-anchor="middle" fill="#bc8cff" font-size="11">15 crates</text>
  <text x="540" y="635" text-anchor="middle" fill="#d29922" font-size="11">14 LLM providers</text>
  <text x="680" y="635" text-anchor="middle" fill="#f85149" font-size="11">40+ skills</text>
  <text x="810" y="635" text-anchor="middle" fill="#3fb950" font-size="11">0 clippy</text>
  <text x="450" y="655" text-anchor="middle" fill="#484f58" font-size="10">Rust | WASM | AGPL-3.0 | github.com/fboiero/Argentor</text>
</svg>
