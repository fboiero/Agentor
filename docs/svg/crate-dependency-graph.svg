<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="'SF Mono','Fira Code',monospace" font-size="10">
  <rect width="800" height="550" fill="#0d1117" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">Crate Dependency Graph (15 crates)</text>
  <!-- Layer labels -->
  <text x="15" y="75" fill="#484f58" font-size="9" transform="rotate(-90 15 75)">L6: CLI</text>
  <text x="15" y="160" fill="#484f58" font-size="9" transform="rotate(-90 15 160)">L5: App</text>
  <text x="15" y="260" fill="#484f58" font-size="9" transform="rotate(-90 15 260)">L4: Agent</text>
  <text x="15" y="350" fill="#484f58" font-size="9" transform="rotate(-90 15 350)">L3: Infra</text>
  <text x="15" y="440" fill="#484f58" font-size="9" transform="rotate(-90 15 440)">L2: Skills</text>
  <text x="15" y="500" fill="#484f58" font-size="9" transform="rotate(-90 15 500)">L1: Core</text>
  <!-- Horizontal lines for layers -->
  <line x1="30" y1="100" x2="780" y2="100" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="30" y1="200" x2="780" y2="200" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="30" y1="300" x2="780" y2="300" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="30" y1="390" x2="780" y2="390" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="30" y1="465" x2="780" y2="465" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- L6: CLI -->
  <rect x="340" y="55" width="120" height="35" fill="#1c2128" stroke="#d29922" stroke-width="2" rx="6"/>
  <text x="400" y="77" text-anchor="middle" fill="#d29922" font-size="11" font-weight="bold">cli</text>
  <!-- L5: Gateway, Orchestrator, A2A -->
  <rect x="100" y="120" width="140" height="35" fill="#1c2128" stroke="#58a6ff" stroke-width="2" rx="6"/>
  <text x="170" y="142" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">gateway</text>
  <rect x="330" y="120" width="140" height="35" fill="#1c2128" stroke="#bc8cff" stroke-width="2" rx="6"/>
  <text x="400" y="142" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="bold">orchestrator</text>
  <rect x="560" y="120" width="120" height="35" fill="#1c2128" stroke="#3fb950" stroke-width="2" rx="6"/>
  <text x="620" y="142" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">a2a</text>
  <!-- L4: Agent, Builtins, Compliance -->
  <rect x="80" y="220" width="130" height="35" fill="#1c2128" stroke="#f85149" stroke-width="2" rx="6"/>
  <text x="145" y="242" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">agent</text>
  <rect x="280" y="220" width="130" height="35" fill="#1c2128" stroke="#d29922" stroke-width="2" rx="6"/>
  <text x="345" y="242" text-anchor="middle" fill="#d29922" font-size="11" font-weight="bold">builtins</text>
  <rect x="480" y="220" width="140" height="35" fill="#1c2128" stroke="#f85149" stroke-width="1.5" rx="6"/>
  <text x="550" y="242" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">compliance</text>
  <!-- L3: MCP, Memory, Channels -->
  <rect x="80" y="310" width="130" height="35" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5" rx="6"/>
  <text x="145" y="332" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">mcp</text>
  <rect x="280" y="310" width="130" height="35" fill="#1c2128" stroke="#d29922" stroke-width="1.5" rx="6"/>
  <text x="345" y="332" text-anchor="middle" fill="#d29922" font-size="11" font-weight="bold">memory</text>
  <rect x="480" y="310" width="140" height="35" fill="#1c2128" stroke="#3fb950" stroke-width="1.5" rx="6"/>
  <text x="550" y="332" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">channels</text>
  <!-- L2: Skills -->
  <rect x="280" y="405" width="130" height="35" fill="#1c2128" stroke="#bc8cff" stroke-width="2" rx="6"/>
  <text x="345" y="427" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="bold">skills</text>
  <!-- L1: Core, Security, Session -->
  <rect x="100" y="480" width="130" height="35" fill="#1c2128" stroke="#58a6ff" stroke-width="2" rx="6"/>
  <text x="165" y="502" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">core</text>
  <rect x="310" y="480" width="130" height="35" fill="#1c2128" stroke="#f85149" stroke-width="2" rx="6"/>
  <text x="375" y="502" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">security</text>
  <rect x="520" y="480" width="130" height="35" fill="#1c2128" stroke="#3fb950" stroke-width="2" rx="6"/>
  <text x="585" y="502" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">session</text>
  <!-- Arrows (key dependencies only) -->
  <!-- CLI → gateway, orchestrator -->
  <line x1="370" y1="90" x2="200" y2="120" stroke="#484f58" stroke-width="1"/>
  <line x1="400" y1="90" x2="400" y2="120" stroke="#484f58" stroke-width="1"/>
  <line x1="430" y1="90" x2="600" y2="120" stroke="#484f58" stroke-width="1"/>
  <!-- Gateway → agent, builtins -->
  <line x1="145" y1="155" x2="145" y2="220" stroke="#484f58" stroke-width="1"/>
  <line x1="200" y1="155" x2="320" y2="220" stroke="#484f58" stroke-width="1"/>
  <!-- Orchestrator → agent, compliance -->
  <line x1="380" y1="155" x2="170" y2="220" stroke="#484f58" stroke-width="1"/>
  <line x1="430" y1="155" x2="530" y2="220" stroke="#484f58" stroke-width="1"/>
  <!-- Agent → mcp, skills -->
  <line x1="120" y1="255" x2="145" y2="310" stroke="#484f58" stroke-width="1"/>
  <line x1="170" y1="255" x2="330" y2="405" stroke="#484f58" stroke-width="1"/>
  <!-- Builtins → skills, memory -->
  <line x1="345" y1="255" x2="345" y2="310" stroke="#484f58" stroke-width="1"/>
  <line x1="310" y1="255" x2="345" y2="405" stroke="#484f58" stroke-width="1"/>
  <!-- MCP → skills, security -->
  <line x1="145" y1="345" x2="300" y2="405" stroke="#484f58" stroke-width="1"/>
  <line x1="145" y1="345" x2="350" y2="480" stroke="#484f58" stroke-width="1"/>
  <!-- Skills → core, security -->
  <line x1="310" y1="440" x2="190" y2="480" stroke="#484f58" stroke-width="1"/>
  <line x1="345" y1="440" x2="375" y2="480" stroke="#484f58" stroke-width="1"/>
  <!-- Memory, Channels → core -->
  <line x1="345" y1="345" x2="190" y2="480" stroke="#484f58" stroke-width="1"/>
  <line x1="530" y1="345" x2="190" y2="480" stroke="#484f58" stroke-width="1"/>
  <!-- Session → core -->
  <line x1="560" y1="480" x2="230" y2="497" stroke="#484f58" stroke-width="1"/>
  <!-- PyO3 (excluded) -->
  <rect x="670" y="220" width="100" height="35" fill="#1c2128" stroke="#484f58" stroke-width="1" stroke-dasharray="4,3" rx="6"/>
  <text x="720" y="242" text-anchor="middle" fill="#484f58" font-size="10">python</text>
  <text x="720" y="268" text-anchor="middle" fill="#484f58" font-size="8">(PyO3, excluded)</text>
  <!-- Legend -->
  <text x="400" y="540" text-anchor="middle" fill="#484f58" font-size="9">Zero circular dependencies | Dependencies flow top→bottom only</text>
</svg>
