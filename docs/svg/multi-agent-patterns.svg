<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'SF Mono','Fira Code',monospace" font-size="11">
  <rect width="900" height="400" fill="#0d1117" rx="12"/>
  <text x="450" y="30" text-anchor="middle" fill="#bc8cff" font-size="15" font-weight="bold">6 Multi-Agent Collaboration Patterns</text>
  <!-- Pattern 1: Pipeline -->
  <rect x="20" y="50" width="270" height="140" fill="#1c2128" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="155" y="72" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">1. PIPELINE</text>
  <text x="155" y="88" text-anchor="middle" fill="#8b949e" font-size="9">Sequential processing chain</text>
  <circle cx="70" cy="120" r="18" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
  <text x="70" y="124" text-anchor="middle" fill="#58a6ff" font-size="10">A</text>
  <line x1="88" y1="120" x2="132" y2="120" stroke="#484f58" stroke-width="2"/>
  <text x="110" y="115" text-anchor="middle" fill="#484f58" font-size="8">→</text>
  <circle cx="155" cy="120" r="18" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
  <text x="155" y="124" text-anchor="middle" fill="#3fb950" font-size="10">B</text>
  <line x1="173" y1="120" x2="217" y2="120" stroke="#484f58" stroke-width="2"/>
  <text x="195" y="115" text-anchor="middle" fill="#484f58" font-size="8">→</text>
  <circle cx="240" cy="120" r="18" fill="#0d1117" stroke="#d29922" stroke-width="2"/>
  <text x="240" y="124" text-anchor="middle" fill="#d29922" font-size="10">C</text>
  <text x="155" y="158" text-anchor="middle" fill="#8b949e" font-size="9">Research → Write → Review</text>
  <text x="155" y="175" text-anchor="middle" fill="#e6edf3" font-size="9">Best for: sequential workflows</text>
  <!-- Pattern 2: MapReduce -->
  <rect x="310" y="50" width="270" height="140" fill="#1c2128" stroke="#58a6ff" stroke-width="1.5" rx="8"/>
  <text x="445" y="72" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">2. MAP-REDUCE</text>
  <text x="445" y="88" text-anchor="middle" fill="#8b949e" font-size="9">Split work, merge results</text>
  <circle cx="370" cy="115" r="14" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="370" y="119" text-anchor="middle" fill="#3fb950" font-size="9">M1</text>
  <circle cx="370" cy="148" r="14" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="370" y="152" text-anchor="middle" fill="#3fb950" font-size="9">M2</text>
  <circle cx="370" cy="115" r="14" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="445" cy="130" r="18" fill="#0d1117" stroke="#d29922" stroke-width="2"/>
  <text x="445" y="134" text-anchor="middle" fill="#d29922" font-size="8">Reduce</text>
  <line x1="384" y1="115" x2="427" y2="125" stroke="#484f58" stroke-width="1.5"/>
  <line x1="384" y1="148" x2="427" y2="135" stroke="#484f58" stroke-width="1.5"/>
  <circle cx="520" cy="130" r="18" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
  <text x="520" y="134" text-anchor="middle" fill="#58a6ff" font-size="8">Result</text>
  <line x1="463" y1="130" x2="502" y2="130" stroke="#484f58" stroke-width="1.5"/>
  <text x="445" y="175" text-anchor="middle" fill="#e6edf3" font-size="9">Best for: parallelizable tasks</text>
  <!-- Pattern 3: Debate -->
  <rect x="600" y="50" width="280" height="140" fill="#1c2128" stroke="#f85149" stroke-width="1.5" rx="8"/>
  <text x="740" y="72" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">3. DEBATE</text>
  <text x="740" y="88" text-anchor="middle" fill="#8b949e" font-size="9">Adversarial deliberation</text>
  <circle cx="670" cy="120" r="16" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="670" y="124" text-anchor="middle" fill="#3fb950" font-size="8">Pro</text>
  <circle cx="810" cy="120" r="16" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="810" y="124" text-anchor="middle" fill="#f85149" font-size="8">Con</text>
  <line x1="686" y1="120" x2="794" y2="120" stroke="#484f58" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="740" y="116" text-anchor="middle" fill="#484f58" font-size="8">argue</text>
  <circle cx="740" cy="155" r="16" fill="#0d1117" stroke="#d29922" stroke-width="2"/>
  <text x="740" y="159" text-anchor="middle" fill="#d29922" font-size="8">Judge</text>
  <text x="740" y="180" text-anchor="middle" fill="#e6edf3" font-size="9">Best for: complex decisions</text>
  <!-- Pattern 4: Ensemble -->
  <rect x="20" y="210" width="270" height="140" fill="#1c2128" stroke="#d29922" stroke-width="1.5" rx="8"/>
  <text x="155" y="232" text-anchor="middle" fill="#d29922" font-size="12" font-weight="bold">4. ENSEMBLE</text>
  <text x="155" y="248" text-anchor="middle" fill="#8b949e" font-size="9">Independent solve + aggregate</text>
  <circle cx="70" cy="280" r="14" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="70" y="284" text-anchor="middle" fill="#58a6ff" font-size="9">A1</text>
  <circle cx="120" cy="280" r="14" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="120" y="284" text-anchor="middle" fill="#58a6ff" font-size="9">A2</text>
  <circle cx="170" cy="280" r="14" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="170" y="284" text-anchor="middle" fill="#58a6ff" font-size="9">A3</text>
  <rect x="200" y="270" width="60" height="22" fill="#0d1117" stroke="#d29922" rx="4"/>
  <text x="230" y="285" text-anchor="middle" fill="#d29922" font-size="9">Vote</text>
  <text x="155" y="325" text-anchor="middle" fill="#e6edf3" font-size="9">Best for: high-accuracy needs</text>
  <text x="155" y="340" text-anchor="middle" fill="#8b949e" font-size="9">Strategy: Majority/Weighted/Best</text>
  <!-- Pattern 5: Supervisor -->
  <rect x="310" y="210" width="270" height="140" fill="#1c2128" stroke="#bc8cff" stroke-width="1.5" rx="8"/>
  <text x="445" y="232" text-anchor="middle" fill="#bc8cff" font-size="12" font-weight="bold">5. SUPERVISOR</text>
  <text x="445" y="248" text-anchor="middle" fill="#8b949e" font-size="9">Manager reviews workers</text>
  <circle cx="445" cy="275" r="18" fill="#0d1117" stroke="#bc8cff" stroke-width="2"/>
  <text x="445" y="279" text-anchor="middle" fill="#bc8cff" font-size="8">Sup</text>
  <circle cx="380" cy="318" r="14" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="380" y="322" text-anchor="middle" fill="#3fb950" font-size="9">W1</text>
  <circle cx="445" cy="318" r="14" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="445" y="322" text-anchor="middle" fill="#3fb950" font-size="9">W2</text>
  <circle cx="510" cy="318" r="14" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="510" y="322" text-anchor="middle" fill="#3fb950" font-size="9">W3</text>
  <line x1="435" y1="293" x2="385" y2="305" stroke="#484f58" stroke-width="1"/>
  <line x1="445" y1="293" x2="445" y2="304" stroke="#484f58" stroke-width="1"/>
  <line x1="455" y1="293" x2="505" y2="305" stroke="#484f58" stroke-width="1"/>
  <text x="445" y="345" text-anchor="middle" fill="#8b949e" font-size="9">Policy: Always/Sample/OnError</text>
  <!-- Pattern 6: Swarm -->
  <rect x="600" y="210" width="280" height="140" fill="#1c2128" stroke="#3fb950" stroke-width="1.5" rx="8"/>
  <text x="740" y="232" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">6. SWARM</text>
  <text x="740" y="248" text-anchor="middle" fill="#8b949e" font-size="9">Iterate until consensus</text>
  <circle cx="700" cy="280" r="16" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="700" y="284" text-anchor="middle" fill="#58a6ff" font-size="9">A</text>
  <circle cx="780" cy="280" r="16" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="780" y="284" text-anchor="middle" fill="#3fb950" font-size="9">B</text>
  <circle cx="740" cy="320" r="16" fill="#0d1117" stroke="#d29922" stroke-width="1.5"/>
  <text x="740" y="324" text-anchor="middle" fill="#d29922" font-size="9">C</text>
  <line x1="714" y1="275" x2="766" y2="275" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="710" y1="294" x2="730" y2="308" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="770" y1="294" x2="750" y2="308" stroke="#484f58" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="740" y="348" text-anchor="middle" fill="#e6edf3" font-size="9">Best for: creative/exploratory</text>
  <!-- Bottom legend -->
  <rect x="20" y="365" width="860" height="25" fill="#161b22" stroke="#30363d" rx="6"/>
  <text x="450" y="382" text-anchor="middle" fill="#8b949e" font-size="10">All patterns support: BudgetTracker (per-agent tokens) | EventBus (lifecycle events) | ErrorAggregator (failure fingerprinting)</text>
</svg>
