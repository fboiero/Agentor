[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "argentor-pydantic-ai-runner"
version = "0.1.0"
description = "Pydantic AI runner for Argentor benchmark harness"
authors = [{name = "Argentor Contributors"}]
license = "AGPL-3.0-only"
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
real = [
    "pydantic-ai>=0.5",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.1",
]

[project.scripts]
argentor-pydantic-ai-runner = "argentor_pydantic_ai_runner.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/argentor_pydantic_ai_runner"]

[tool.ruff]
target-version = "py310"
line-length = 100
