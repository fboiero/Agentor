[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "argentor-claude-agent-sdk-runner"
version = "0.1.0"
description = "Claude Agent SDK runner for Argentor benchmark harness"
authors = [{name = "Argentor Contributors"}]
license = "AGPL-3.0-only"
requires-python = ">=3.10"
dependencies = [
    "click>=8.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
real = [
    "claude-agent-sdk>=0.2",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.1",
]

[project.scripts]
argentor-claude-agent-sdk-runner = "argentor_claude_agent_sdk_runner.main:main"

[tool.hatch.build.targets.wheel]
packages = ["src/argentor_claude_agent_sdk_runner"]

[tool.ruff]
target-version = "py310"
line-length = 100
