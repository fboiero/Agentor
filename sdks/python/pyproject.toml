[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "argentor-sdk"
version = "1.0.0"
description = "Python SDK client for the Argentor AI agent framework REST API"
readme = "README.md"
license = "AGPL-3.0-only"
requires-python = ">=3.9"
authors = [
    { name = "Argentor Contributors" },
]
keywords = ["argentor", "ai", "agent", "sdk", "client"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.25.0,<1.0.0",
    "pydantic>=2.0.0,<3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "respx>=0.21",
    "mypy>=1.8",
    "ruff>=0.3",
]

[project.urls]
Homepage = "https://github.com/fboiero/Agentor"
Documentation = "https://github.com/fboiero/Agentor/tree/master/sdks/python"
Repository = "https://github.com/fboiero/Agentor"
Issues = "https://github.com/fboiero/Agentor/issues"

[tool.hatch.build.targets.wheel]
packages = ["argentor"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.9"
strict = true
warn_return_any = true
warn_unused_configs = true
